<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Welcome to the Interactive Reveal What's that Animal UI</h1>
<p>Click on the buttons below to reveal the animal images</p>

<div class="zoo">

    <div class="animal-box">
        <img src="images/cat.jpg" class="animal-img" id="catImg">
        <button id="catBtn">Reveal CAT</button>
        <button class="hide-btn" id="catHideBtn" onclick="hideAnimal('cat')">Hide Result</button>
    </div>

    <div class="animal-box">
        <img src="images/dog.jpg" class="animal-img" id="dogImg">
        <button id="dogBtn">Reveal DOG</button>
        <button class="hide-btn" id="dogHideBtn" onclick="hideAnimal('dog')">Hide Result</button>
    </div>

    <div class="animal-box">
        <img src="images/cow.jpg" class="animal-img" id="cowImg">
        <button id="cowBtn">Reveal COW</button>
        <button class="hide-btn" id="cowHideBtn" onclick="hideAnimal('cow')">Hide Result</button>
    </div>

</div>

<div class="bottom-bar">
    <button id="resetBtn" onclick="resetZoo()">Reset Zoo</button>
    <h3>Animals on Screen: <span id="counter">0</span></h3>
</div>

<script src="main.js"></script>
</body>
</html>
